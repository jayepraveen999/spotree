<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotree Admin</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace; background: #111217; color: #d0d0d0; }

    .topbar {
      background: #181b1f;
      border-bottom: 1px solid #2a2d35;
      height: 40px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .topbar h1 { font-size: 15px; font-weight: 600; color: #ccc; display: flex; align-items: center; gap: 8px; }
    .topbar .brand-accent { color: #3d71d9; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .topbar .last-updated { font-size: 11px; color: #555; }
    .topbar .refresh-btn {
      background: transparent;
      border: 1px solid #3a3d45;
      color: #aaa;
      padding: 4px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.15s;
    }
    .topbar .refresh-btn:hover { border-color: #3d71d9; color: #3d71d9; }

    .layout {
      display: flex;
      height: calc(100vh - 40px);
    }

    .left-col {
      width: 380px;
      min-width: 340px;
      display: flex;
      flex-direction: column;
      gap: 1px;
      background: #1e2028;
      overflow-y: auto;
    }
    .left-col::-webkit-scrollbar { width: 4px; }
    .left-col::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .right-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1px;
      background: #1e2028;
    }

    .stats-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: #1e2028;
    }
    .stat-cell {
      background: #181b1f;
      padding: 12px 14px;
      text-align: center;
    }
    .stat-cell .val { font-size: 26px; font-weight: 700; color: #fff; font-variant-numeric: tabular-nums; }
    .stat-cell .lbl { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
    .stat-cell .sub { font-size: 10px; color: #3d71d9; margin-top: 2px; }

    .panel {
      background: #181b1f;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .panel-head {
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      border-bottom: 1px solid #22252d;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .panel-head .tag {
      font-size: 10px;
      color: #555;
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
    }

    .panel-scroll {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }
    .panel-scroll::-webkit-scrollbar { width: 4px; }
    .panel-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    #map { flex: 1; }
    .leaflet-container { background: #181b1f; }

    .row-item {
      display: flex;
      align-items: center;
      padding: 6px 14px;
      border-bottom: 1px solid #1e2028;
      gap: 10px;
      font-size: 13px;
      transition: background 0.1s;
    }
    .row-item:hover { background: #1e2028; }
    .row-item:last-child { border-bottom: none; }
    .row-item .name { flex: 1; color: #c0c0c0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .row-item .bar-wrap { flex: 0 0 80px; height: 4px; background: #22252d; border-radius: 2px; overflow: hidden; }
    .row-item .bar-inner { height: 100%; border-radius: 2px; }
    .row-item .num {
      font-variant-numeric: tabular-nums;
      font-weight: 600;
      font-size: 12px;
      color: #aaa;
      min-width: 28px;
      text-align: right;
    }

    .bar-species { background: #3d71d9; }
    .bar-school { background: #b877d9; }

    .health-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1px;
      background: #1e2028;
    }
    .health-cell {
      background: #181b1f;
      text-align: center;
      padding: 14px 10px;
    }
    .health-cell .h-val { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .health-cell .h-lbl { font-size: 10px; color: #666; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }

    .activity-item {
      display: flex;
      align-items: flex-start;
      padding: 7px 14px;
      border-bottom: 1px solid #1e2028;
      gap: 10px;
      font-size: 12px;
    }
    .activity-item:hover { background: #1e2028; }
    .activity-item:last-child { border-bottom: none; }
    .activity-item .a-dot { width: 6px; height: 6px; border-radius: 3px; margin-top: 5px; flex-shrink: 0; }
    .activity-item .a-dot.recent { background: #3bb44a; }
    .activity-item .a-dot.older { background: #555; }
    .activity-item .a-body { flex: 1; }
    .activity-item .a-text { color: #bbb; }
    .activity-item .a-text strong { color: #ddd; font-weight: 600; }
    .activity-item .a-meta { color: #555; margin-top: 1px; font-size: 11px; }
    .activity-item .a-song { color: #3d71d9; }
    .activity-item .a-time { color: #555; font-size: 11px; white-space: nowrap; margin-top: 2px; }

    .empty-msg { padding: 20px; text-align: center; color: #444; font-size: 12px; }

    @media (max-width: 900px) {
      .layout { flex-direction: column; }
      .left-col { width: 100%; min-width: 0; max-height: 50vh; }
      .right-col { min-height: 300px; }
      .stats-strip { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>&#127795; <span class="brand-accent">Spotree</span> Admin</h1>
    <div class="topbar-right">
      <span class="last-updated" id="lastUpdated"></span>
      <button class="refresh-btn" onclick="loadAll()">Refresh</button>
    </div>
  </div>

  <div class="layout">
    <div class="left-col">
      <div class="stats-strip">
        <div class="stat-cell"><div class="lbl">Trees</div><div class="val" id="totalTrees">-</div><div class="sub" id="treesThisWeek"></div></div>
        <div class="stat-cell"><div class="lbl">Users</div><div class="val" id="totalUsers">-</div><div class="sub" id="activeUsers"></div></div>
        <div class="stat-cell"><div class="lbl">Species</div><div class="val" id="speciesCount">-</div><div class="sub" id="topSpecies"></div></div>
        <div class="stat-cell"><div class="lbl">Songs</div><div class="val" id="songsCount">-</div><div class="sub" id="songPercent"></div></div>
      </div>

      <div class="panel">
        <div class="panel-head">Species <span class="tag" id="speciesTag"></span></div>
        <div class="panel-scroll" id="speciesList"><div class="empty-msg">Loading...</div></div>
      </div>

      <div class="panel">
        <div class="panel-head">Schools <span class="tag" id="schoolTag"></span></div>
        <div class="panel-scroll" id="schoolList"><div class="empty-msg">Loading...</div></div>
      </div>

      <div class="panel" style="flex:0 0 auto">
        <div class="panel-head">Health</div>
        <div class="health-grid" id="healthGrid"><div class="empty-msg">Loading...</div></div>
      </div>

      <div class="panel">
        <div class="panel-head">Activity <span class="tag">last 20</span></div>
        <div class="panel-scroll" id="activityList"><div class="empty-msg">Loading...</div></div>
      </div>
    </div>

    <div class="right-col">
      <div id="map"></div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://kgpzdztntwrpwelsnmwy.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtncHpkenRudHdycHdlbHNubXd5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3ODYxOTksImV4cCI6MjA5NDM2MjE5OX0.3YQ92WRjtFRkNJURzQgl8-zFNXv1-v1l66zyxgjQR8Q';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const map = L.map('map', { zoomControl: false }).setView([48.1351, 11.582], 12);
    L.control.zoom({ position: 'topright' }).addTo(map);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OSM &copy; CARTO'
    }).addTo(map);

    const markers = L.layerGroup().addTo(map);

    const treeIcon = L.divIcon({
      html: '<div style="background:#3bb44a;width:8px;height:8px;border-radius:50%;box-shadow:0 0 6px rgba(59,180,74,0.6)"></div>',
      className: '',
      iconSize: [8, 8],
      iconAnchor: [4, 4],
    });

    function timeAgo(dateStr) {
      const diff = Date.now() - new Date(dateStr).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 60) return mins <= 1 ? 'now' : mins + 'm';
      const hours = Math.floor(mins / 60);
      if (hours < 24) return hours + 'h';
      const days = Math.floor(hours / 24);
      return days + 'd';
    }

    async function loadAll() {
      const { data: trees } = await sb.from('trees_with_user').select('*');
      const { data: profiles } = await sb.from('profiles').select('*');
      if (!trees || !profiles) return;

      document.getElementById('lastUpdated').textContent = 'Updated ' + new Date().toLocaleTimeString();

      const now = new Date();
      const weekAgo = new Date(now - 7 * 86400000);
      const thisWeek = trees.filter(t => new Date(t.created_at) > weekAgo);

      document.getElementById('totalTrees').textContent = trees.length;
      document.getElementById('treesThisWeek').textContent = '+' + thisWeek.length + ' / 7d';
      document.getElementById('totalUsers').textContent = profiles.length;
      const activeIds = new Set(thisWeek.map(t => t.user_id));
      document.getElementById('activeUsers').textContent = activeIds.size + ' active';

      const speciesMap = {};
      trees.forEach(t => { speciesMap[t.species] = (speciesMap[t.species] || 0) + 1; });
      const speciesSorted = Object.entries(speciesMap).sort((a, b) => b[1] - a[1]);
      document.getElementById('speciesCount').textContent = speciesSorted.length;
      document.getElementById('topSpecies').textContent = speciesSorted.length ? speciesSorted[0][0].split('(')[0].trim() : '-';

      const songs = trees.filter(t => t.spotify_url);
      document.getElementById('songsCount').textContent = songs.length;
      document.getElementById('songPercent').textContent = trees.length ? Math.round(songs.length / trees.length * 100) + '%' : '0%';

      // Map
      markers.clearLayers();
      trees.forEach(t => {
        if (!t.latitude || !t.longitude) return;
        const m = L.marker([t.latitude, t.longitude], { icon: treeIcon }).addTo(markers);
        let popup = `<div style="font-family:monospace;font-size:11px;color:#ccc;line-height:1.5">`;
        popup += `<strong style="color:#fff">${t.species}</strong><br>`;
        popup += `${t.user_name} &middot; ${timeAgo(t.created_at)}<br>`;
        popup += `${t.health_status || '?'} &middot; ${t.estimated_height || '?'}`;
        if (t.spotify_track_name) popup += `<br><span style="color:#3d71d9">&#9835; ${t.spotify_track_name}</span>`;
        popup += '</div>';
        m.bindPopup(popup, { className: 'dark-popup' });
      });
      if (trees.length) {
        const bounds = L.latLngBounds(trees.filter(t => t.latitude).map(t => [t.latitude, t.longitude]));
        map.fitBounds(bounds, { padding: [40, 40] });
      }

      // Species
      const maxSp = speciesSorted.length ? speciesSorted[0][1] : 1;
      document.getElementById('speciesTag').textContent = speciesSorted.length + ' total';
      document.getElementById('speciesList').innerHTML = speciesSorted.length
        ? speciesSorted.map(([name, count]) => `
          <div class="row-item">
            <div class="name">${name}</div>
            <div class="bar-wrap"><div class="bar-inner bar-species" style="width:${Math.round(count/maxSp*100)}%"></div></div>
            <div class="num">${count}</div>
          </div>`).join('')
        : '<div class="empty-msg">No data</div>';

      // Schools
      const schoolMap = {};
      trees.forEach(t => {
        const p = profiles.find(p => p.id === t.user_id);
        const s = p?.school_name || 'Unknown';
        schoolMap[s] = (schoolMap[s] || 0) + 1;
      });
      const schoolSorted = Object.entries(schoolMap).sort((a, b) => b[1] - a[1]);
      const maxSc = schoolSorted.length ? schoolSorted[0][1] : 1;
      document.getElementById('schoolTag').textContent = schoolSorted.length + ' total';
      document.getElementById('schoolList').innerHTML = schoolSorted.length
        ? schoolSorted.map(([name, count]) => `
          <div class="row-item">
            <div class="name">${name || 'Unknown'}</div>
            <div class="bar-wrap"><div class="bar-inner bar-school" style="width:${Math.round(count/maxSc*100)}%"></div></div>
            <div class="num">${count}</div>
          </div>`).join('')
        : '<div class="empty-msg">No data</div>';

      // Health
      const healthMap = {};
      trees.forEach(t => { const s = t.health_status || 'Unknown'; healthMap[s] = (healthMap[s] || 0) + 1; });
      const hColors = { 'Healthy': '#3bb44a', 'Fair': '#e5a63b', 'Poor': '#e55a5a', 'Dead': '#666', 'Unknown': '#555' };
      document.getElementById('healthGrid').innerHTML = Object.entries(healthMap)
        .sort((a, b) => b[1] - a[1])
        .map(([s, c]) => `<div class="health-cell"><div class="h-val" style="color:${hColors[s]||'#aaa'}">${c}</div><div class="h-lbl">${s}</div></div>`)
        .join('') || '<div class="empty-msg">No data</div>';

      // Activity
      const recent = [...trees].sort((a, b) => new Date(b.created_at) - new Date(a.created_at)).slice(0, 20);
      const hourAgo = new Date(now - 3600000);
      document.getElementById('activityList').innerHTML = recent.length
        ? recent.map(t => {
          const isRecent = new Date(t.created_at) > hourAgo;
          return `<div class="activity-item">
            <div class="a-dot ${isRecent ? 'recent' : 'older'}"></div>
            <div class="a-body">
              <div class="a-text"><strong>${t.user_name}</strong> spotted <strong>${t.species.split('(')[0].trim()}</strong></div>
              <div class="a-meta">${t.health_status || 'Unknown'}${t.spotify_track_name ? ' &middot; <span class="a-song">&#9835; ' + t.spotify_track_name + '</span>' : ''}</div>
            </div>
            <div class="a-time">${timeAgo(t.created_at)}</div>
          </div>`;
        }).join('')
        : '<div class="empty-msg">No activity</div>';
    }

    loadAll();
    window.addEventListener('resize', () => map.invalidateSize());
  </script>
  <style>
    .dark-popup .leaflet-popup-content-wrapper { background: #22252d; color: #ccc; border-radius: 6px; box-shadow: 0 2px 12px rgba(0,0,0,0.5); }
    .dark-popup .leaflet-popup-tip { background: #22252d; }
    .dark-popup .leaflet-popup-close-button { color: #666; }
  </style>
</body>
</html>
