<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotree Admin</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8faf8; color: #1b4332; }

    .topbar {
      background: #1b4332;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .topbar h1 { font-size: 20px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 8px; }
    .topbar .brand-spot { color: #52b788; }
    .topbar .refresh-btn {
      background: #52b788;
      border: none;
      color: #fff;
      padding: 7px 18px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: background 0.2s;
    }
    .topbar .refresh-btn:hover { background: #40916c; }

    .layout {
      display: flex;
      height: calc(100vh - 48px);
    }

    .left-panel {
      width: 420px;
      min-width: 360px;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      border-right: 1px solid #d1fae5;
    }
    .left-panel::-webkit-scrollbar { width: 5px; }
    .left-panel::-webkit-scrollbar-thumb { background: #b7e4c7; border-radius: 3px; }

    .right-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    #map { flex: 1; }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .stat-card {
      background: #fff;
      border-radius: 12px;
      padding: 14px;
      border: 1px solid #d1fae5;
    }
    .stat-card .label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
    .stat-card .value { font-size: 28px; font-weight: 800; color: #1b4332; }
    .stat-card .sub { font-size: 11px; color: #52b788; margin-top: 2px; font-weight: 500; }

    .panel {
      background: #fff;
      border-radius: 12px;
      border: 1px solid #d1fae5;
      overflow: hidden;
    }
    .panel-header {
      padding: 12px 16px;
      font-weight: 700;
      font-size: 13px;
      border-bottom: 1px solid #e8f5e9;
      display: flex;
      align-items: center;
      gap: 6px;
      color: #1b4332;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .panel-header .icon { color: #2d6a4f; }

    .panel-body { max-height: 180px; overflow-y: auto; }
    .panel-body::-webkit-scrollbar { width: 4px; }
    .panel-body::-webkit-scrollbar-thumb { background: #b7e4c7; border-radius: 2px; }

    .species-row, .school-row {
      display: flex;
      align-items: center;
      padding: 8px 16px;
      border-bottom: 1px solid #f0fdf4;
      gap: 10px;
    }
    .species-row:last-child, .school-row:last-child { border-bottom: none; }
    .species-row .name, .school-row .name { flex: 1; font-size: 13px; color: #444; }
    .species-row .count, .school-row .count {
      font-weight: 700;
      font-size: 12px;
      color: #2d6a4f;
      background: #e8f5e9;
      padding: 2px 10px;
      border-radius: 10px;
    }
    .bar-container { flex: 0 0 80px; height: 6px; background: #e8f5e9; border-radius: 3px; overflow: hidden; }
    .bar-fill { height: 100%; background: #52b788; border-radius: 3px; }

    .activity-row {
      display: flex;
      align-items: flex-start;
      padding: 8px 16px;
      border-bottom: 1px solid #f0fdf4;
      gap: 10px;
    }
    .activity-row:last-child { border-bottom: none; }
    .activity-dot { width: 7px; height: 7px; border-radius: 4px; background: #52b788; margin-top: 5px; flex-shrink: 0; }
    .activity-info { flex: 1; }
    .activity-info .text { font-size: 13px; color: #444; }
    .activity-info .text strong { color: #1b4332; }
    .activity-info .time { font-size: 11px; color: #999; margin-top: 1px; }
    .activity-info .song-tag { color: #2d6a4f; font-weight: 500; }

    .health-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      padding: 12px 16px;
    }
    .health-item {
      text-align: center;
      padding: 10px;
      border-radius: 8px;
      background: #f0fdf4;
    }
    .health-item .h-value { font-size: 22px; font-weight: 800; }
    .health-item .h-label { font-size: 11px; color: #888; margin-top: 2px; }

    .loading { padding: 24px; text-align: center; color: #999; font-size: 13px; }

    @media (max-width: 900px) {
      .layout { flex-direction: column-reverse; }
      .left-panel { width: 100%; min-width: 0; height: 50vh; border-right: none; border-top: 1px solid #d1fae5; }
      .right-panel { height: 50vh; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>
      <span>&#127795;</span>
      <span><span class="brand-spot">Spo</span>tree Admin</span>
    </h1>
    <button class="refresh-btn" onclick="loadAll()">&#8635; Refresh</button>
  </div>

  <div class="layout">
    <div class="left-panel">
      <div class="stats-row">
        <div class="stat-card">
          <div class="label">Trees</div>
          <div class="value" id="totalTrees">-</div>
          <div class="sub" id="treesThisWeek"></div>
        </div>
        <div class="stat-card">
          <div class="label">Users</div>
          <div class="value" id="totalUsers">-</div>
          <div class="sub" id="activeUsers"></div>
        </div>
        <div class="stat-card">
          <div class="label">Species</div>
          <div class="value" id="speciesCount">-</div>
          <div class="sub" id="topSpecies"></div>
        </div>
        <div class="stat-card">
          <div class="label">Songs</div>
          <div class="value" id="songsCount">-</div>
          <div class="sub" id="songPercent"></div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header"><span class="icon">&#127795;</span> Species</div>
        <div class="panel-body" id="speciesList"><div class="loading">Loading...</div></div>
      </div>

      <div class="panel">
        <div class="panel-header"><span class="icon">&#127979;</span> Schools</div>
        <div class="panel-body" id="schoolList"><div class="loading">Loading...</div></div>
      </div>

      <div class="panel">
        <div class="panel-header"><span class="icon">&#129657;</span> Health</div>
        <div class="health-grid" id="healthGrid"><div class="loading">Loading...</div></div>
      </div>

      <div class="panel">
        <div class="panel-header"><span class="icon">&#128338;</span> Recent Activity</div>
        <div class="panel-body" id="activityList"><div class="loading">Loading...</div></div>
      </div>
    </div>

    <div class="right-panel">
      <div id="map"></div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://kgpzdztntwrpwelsnmwy.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtncHpkenRudHdycHdlbHNubXd5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3ODYxOTksImV4cCI6MjA5NDM2MjE5OX0.3YQ92WRjtFRkNJURzQgl8-zFNXv1-v1l66zyxgjQR8Q';

    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const map = L.map('map').setView([48.1351, 11.582], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    const markers = L.layerGroup().addTo(map);

    const treeIcon = L.divIcon({
      html: '<div style="background:#2d6a4f;width:12px;height:12px;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.3)"></div>',
      className: '',
      iconSize: [12, 12],
      iconAnchor: [6, 6],
    });

    function timeAgo(dateStr) {
      const diff = Date.now() - new Date(dateStr).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 60) return mins <= 1 ? 'Just now' : mins + 'm ago';
      const hours = Math.floor(mins / 60);
      if (hours < 24) return hours + 'h ago';
      const days = Math.floor(hours / 24);
      return days + 'd ago';
    }

    async function loadAll() {
      const { data: trees } = await sb.from('trees_with_user').select('*');
      const { data: profiles } = await sb.from('profiles').select('*');

      if (!trees || !profiles) return;

      const now = new Date();
      const weekAgo = new Date(now - 7 * 86400000);
      const thisWeek = trees.filter(t => new Date(t.created_at) > weekAgo);
      document.getElementById('totalTrees').textContent = trees.length;
      document.getElementById('treesThisWeek').textContent = thisWeek.length + ' this week';

      document.getElementById('totalUsers').textContent = profiles.length;
      const activeIds = new Set(trees.filter(t => new Date(t.created_at) > weekAgo).map(t => t.user_id));
      document.getElementById('activeUsers').textContent = activeIds.size + ' active this week';

      const speciesMap = {};
      trees.forEach(t => { speciesMap[t.species] = (speciesMap[t.species] || 0) + 1; });
      const speciesSorted = Object.entries(speciesMap).sort((a, b) => b[1] - a[1]);
      document.getElementById('speciesCount').textContent = speciesSorted.length;
      document.getElementById('topSpecies').textContent = speciesSorted.length ? 'Top: ' + speciesSorted[0][0].split('(')[0].trim() : '';

      const songs = trees.filter(t => t.spotify_url);
      document.getElementById('songsCount').textContent = songs.length;
      document.getElementById('songPercent').textContent = trees.length ? Math.round(songs.length / trees.length * 100) + '% of trees' : '';

      // Map
      markers.clearLayers();
      trees.forEach(t => {
        if (!t.latitude || !t.longitude) return;
        const m = L.marker([t.latitude, t.longitude], { icon: treeIcon }).addTo(markers);
        let popup = `<div style="font-family:system-ui;font-size:13px">`;
        popup += `<strong>${t.species}</strong><br>`;
        popup += `<span style="color:#888">By ${t.user_name} &middot; ${timeAgo(t.created_at)}</span><br>`;
        popup += `Health: ${t.health_status || 'Unknown'} &middot; Height: ${t.estimated_height || 'Unknown'}`;
        if (t.spotify_track_name) popup += `<br><span style="color:#2d6a4f">&#127925; ${t.spotify_track_name}</span>`;
        popup += '</div>';
        m.bindPopup(popup);
      });
      if (trees.length) {
        const bounds = L.latLngBounds(trees.filter(t => t.latitude).map(t => [t.latitude, t.longitude]));
        map.fitBounds(bounds, { padding: [30, 30] });
      }

      // Species
      const maxSpecies = speciesSorted.length ? speciesSorted[0][1] : 1;
      document.getElementById('speciesList').innerHTML = speciesSorted.length
        ? speciesSorted.map(([name, count]) => `
          <div class="species-row">
            <div class="name">${name}</div>
            <div class="bar-container"><div class="bar-fill" style="width:${Math.round(count / maxSpecies * 100)}%"></div></div>
            <div class="count">${count}</div>
          </div>`).join('')
        : '<div class="loading">No trees yet</div>';

      // Schools
      const schoolMap = {};
      trees.forEach(t => {
        const profile = profiles.find(p => p.id === t.user_id);
        const school = profile?.school_name || 'No school';
        schoolMap[school] = (schoolMap[school] || 0) + 1;
      });
      const schoolSorted = Object.entries(schoolMap).sort((a, b) => b[1] - a[1]);
      const maxSchool = schoolSorted.length ? schoolSorted[0][1] : 1;
      document.getElementById('schoolList').innerHTML = schoolSorted.length
        ? schoolSorted.map(([name, count]) => `
          <div class="school-row">
            <div class="name">${name || 'No school'}</div>
            <div class="bar-container"><div class="bar-fill" style="width:${Math.round(count / maxSchool * 100)}%"></div></div>
            <div class="count">${count}</div>
          </div>`).join('')
        : '<div class="loading">No data yet</div>';

      // Health
      const healthMap = {};
      trees.forEach(t => {
        const status = t.health_status || 'Unknown';
        healthMap[status] = (healthMap[status] || 0) + 1;
      });
      const healthColors = { 'Healthy': '#2d6a4f', 'Fair': '#f59e0b', 'Poor': '#ef4444', 'Dead': '#6b7280', 'Unknown': '#999' };
      document.getElementById('healthGrid').innerHTML = Object.entries(healthMap)
        .sort((a, b) => b[1] - a[1])
        .map(([status, count]) => `
          <div class="health-item">
            <div class="h-value" style="color:${healthColors[status] || '#1b4332'}">${count}</div>
            <div class="h-label">${status}</div>
          </div>`).join('') || '<div class="loading">No data yet</div>';

      // Activity
      const recent = [...trees].sort((a, b) => new Date(b.created_at) - new Date(a.created_at)).slice(0, 20);
      document.getElementById('activityList').innerHTML = recent.length
        ? recent.map(t => `
          <div class="activity-row">
            <div class="activity-dot"></div>
            <div class="activity-info">
              <div class="text"><strong>${t.user_name}</strong> spotted a <strong>${t.species}</strong></div>
              <div class="time">${timeAgo(t.created_at)} &middot; ${t.health_status || 'Unknown health'}${t.spotify_track_name ? ' &middot; <span class="song-tag">&#127925; ' + t.spotify_track_name + '</span>' : ''}</div>
            </div>
          </div>`).join('')
        : '<div class="loading">No activity yet</div>';
    }

    loadAll();
    window.addEventListener('resize', () => map.invalidateSize());
  </script>
</body>
</html>
